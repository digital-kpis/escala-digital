<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Controle de Presença</title>
<meta name="description" content="Controle de presença de colaboradores por turno" />
<meta name="theme-color" content="#2B2620" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Presença" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icons/icon-192.png" />
<link rel="apple-touch-icon" href="./icons/icon-512.png" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FAF8F4; }
</style>
</head>
<body>

<div id="root">
  <!-- Exibido enquanto o JavaScript carrega -->
  <div id="boot-loader" style="
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #FAF8F4;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  ">
    <div style="width:10px;height:10px;border-radius:50%;background:#D97757;
      animation:pulse 1.2s ease-in-out infinite;"></div>
    <p style="font-size:13px;color:#9C9586;margin-top:14px;">Carregando…</p>
  </div>
  <style>@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }</style>
</div>

<!-- ====== CREDENCIAIS DO SUPABASE ======
     Se quiser fixar as credenciais no código (sem usar a tela de configuração),
     substitua os valores abaixo pelas suas chaves reais.
     Caso contrário, deixe como "SEU_PROJETO" — o app vai pedir as credenciais
     na primeira abertura e salvá-las no aparelho automaticamente. -->
<script>
  window.SUPABASE_URL = "https://SEU_PROJETO.supabase.co";
  window.SUPABASE_KEY = "SUA_CHAVE_ANON";
</script>

<!-- Supabase JS SDK (UMD) -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- React 18 (UMD) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>

<!-- Babel standalone (transforma JSX no navegador) -->
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<!-- Fallback: mostra aviso se algum CDN não carregar (sem internet na 1ª abertura) -->
<script>
  window.addEventListener("error", function(e) {
    if (e.target && e.target.tagName === "SCRIPT") {
      var loader = document.getElementById("boot-loader");
      if (loader) loader.innerHTML =
        '<div style="max-width:300px;text-align:center;padding:0 24px;">' +
        '<p style="font-size:15px;font-weight:700;color:#2B2620;margin:0 0 8px;">Sem conexão</p>' +
        '<p style="font-size:13px;color:#9C9586;margin:0;line-height:1.5;">Abra o app uma vez com internet para carregar os recursos necessários. Depois funciona offline.</p>' +
        '</div>';
    }
  }, true);
</script>

<!-- Código do app (JSX compilado pelo Babel no navegador) -->
<script type="text/babel" src="./app.jsx"></script>

<!-- Service Worker para funcionamento offline -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("./sw.js").catch(function(err) {
        console.warn("SW não registrado:", err);
      });
    });
  }
</script>

</body>
</html>
